<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liniver | Welcome to the Universe</title>
    <style>
        :root {
            --space-bg: #030712;
            --text-light: #f9fafb;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            background-color: var(--space-bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-light);
        }

        /* --- SPLASH SCREEN SYSTEM --- */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0b1528 0%, var(--space-bg) 80%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1), opacity 0.8s ease;
        }

        #splash-screen.dismissed {
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }

        .splash-title {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            background: linear-gradient(to right, #ffffff, #60a5fa, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .splash-subtitle {
            font-size: 1.1rem;
            color: #9ca3af;
            margin-bottom: 3rem;
            letter-spacing: 2px;
        }

        .enter-btn {
            background: transparent;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 1px;
            border-radius: 30px;
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .enter-btn:hover {
            background: white;
            color: var(--space-bg);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
            border-color: white;
        }

        /* --- CSS HTML5 SOLAR SYSTEM MODEL --- */
        .universe-model {
            position: relative;
            width: 400px;
            height: 400px;
            margin-bottom: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .sun {
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #fde047 0%, #ca8a04 100%);
            border-radius: 50%;
            box-shadow: 0 0 40px #eab308;
            position: absolute;
        }

        /* Orbit Lines */
        .orbit {
            position: absolute;
            border: 1px dashed rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Planet Properties & Animations */
        .orbit.inner  { width: 120px; height: 120px; animation: spin 6s linear infinite; }
        .orbit.middle { width: 220px; height: 220px; animation: spin 12s linear infinite; }
        .orbit.outer  { width: 320px; height: 320px; animation: spin 20s linear infinite; }

        .planet {
            position: absolute;
            border-radius: 50%;
        }

        /* Inner Planet (Cyan) */
        .orbit.inner .planet {
            top: 10px;
            width: 14px;
            height: 14px;
            background: #22d3ee;
            box-shadow: 0 0 10px #06b6d4;
        }

        /* Middle Planet (Blue) */
        .orbit.middle .planet {
            top: 20px;
            width: 22px;
            height: 22px;
            background: #3b82f6;
            box-shadow: 0 0 12px #2563eb;
        }

        /* Outer Planet with Ring */
        .orbit.outer .planet {
            top: 30px;
            width: 26px;
            height: 26px;
            background: #f97316;
            box-shadow: 0 0 15px #ea580c;
        }
        /* Ring element for Outer Planet */
        .orbit.outer .planet::after {
            content: '';
            position: absolute;
            width: 38px;
            height: 8px;
            border: 2px solid rgba(249, 115, 22, 0.5);
            border-radius: 50%;
            left: -8px;
            top: 7px;
            transform: rotate(-15deg);
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* --- MAIN HUB CARD LAYOUT --- */
        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 20px;
            color: #333;
            background: #ffffff;
            min-height: 100vh;
            box-sizing: border-box;
        }
        
        main h1 { text-align: center; font-size: 2.2rem; color: #0f172a; margin-top: 0; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #64748b; margin-bottom: 40px; font-size: 1.1rem; }
        
        /* Grid setup for category portal tiles */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 0;
        }

        .category-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            transition: all 0.25s ease;
        }

        .category-card:hover {
            transform: translateY(-4px);
            background: #0f172a;
            border-color: #0f172a;
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.15);
        }

        .category-card a {
            color: #1e3a8a;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.4rem;
            display: block;
            width: 100%;
            height: 100%;
            transition: color 0.2s ease;
        }

        .category-card:hover a {
            color: #3b82f6;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-title">Liniver</div>
        <div class="splash-subtitle">Explore the Scientific Universe</div>

        <div class="universe-model">
            <div class="sun"></div>
            <div class="orbit inner"><div class="planet"></div></div>
            <div class="orbit middle"><div class="planet"></div></div>
            <div class="orbit outer"><div class="planet"></div></div>
        </div>

        <button class="enter-btn" onclick="dismissSplash()">Enter Dashboard</button>
    </div>

    <main>
        <h1>Class Resource Directory</h1>
        <div class="subtitle">Select a space station category to access course materials.</div>

        <div class="category-grid">
            <div class="category-card"><a href="{{ '/y9/' | relative_url }}">Year 9 &rarr;</a></div>
            <div class="category-card"><a href="{{ '/y10/' | relative_url }}">Year 10 &rarr;</a></div>
            <div class="category-card"><a href="{{ '/y11/' | relative_url }}">Year 11 &rarr;</a></div>
            <div class="category-card"><a href="{{ '/y12/' | relative_url }}">Year 12 &rarr;</a></div>
            <div class="category-card"><a href="{{ '/y13/' | relative_url }}">Year 13 &rarr;</a></div>
            <div class="category-card"><a href="{{ '/general/' | relative_url }}">General &rarr;</a></div>
        </div>
    </main>

    <script>
        function dismissSplash() {
            document.getElementById('splash-screen').classList.add('dismissed');
        }
    </script>
</body>
</html>
